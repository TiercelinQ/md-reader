name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # QtWebEngine (Mermaid view) is imported transitively by the controllers,
      # so its shared libraries must be present even though the QWebEngineView
      # tests themselves are excluded from CI (marker "webengine", see below).
      - name: Install system libraries for Qt (offscreen) + QtWebEngine import
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 \
            libnss3 libnspr4 libdbus-1-3 \
            libxcomposite1 libxdamage1 libxrandr2 libxi6 libxtst6 \
            libxrender1 libfontconfig1 libgbm1 libasound2t64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy strict)
        run: mypy .

      # QWebEngineView instances segfault at teardown under headless CI (Chromium),
      # so the "webengine" tests are excluded here and run locally instead.
      - name: Tests (pytest, excluding QtWebEngine views)
        run: pytest -m "not webengine"
