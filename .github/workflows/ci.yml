name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox --disable-gpu --disable-software-rasterizer"
      QTWEBENGINE_DISABLE_SANDBOX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries for Qt (xcb) + QtWebEngine
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 libxcb-cursor0 \
            libnss3 libnspr4 libdbus-1-3 \
            libxcomposite1 libxdamage1 libxrandr2 libxi6 libxtst6 \
            libxrender1 libfontconfig1 libgbm1 libasound2t64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy strict)
        run: mypy .

      - name: Tests (pytest, under Xvfb for QtWebEngine)
        run: xvfb-run -a pytest
